<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100" viewBox="0 0 800 100">
  <g font-family="Impact, system-ui, sans-serif" font-size="65" font-weight="900" letter-spacing="6" font-style="italic">
    
    <text x="50%" y="70" text-anchor="middle" fill="#00FFFF" opacity="0.8">
      <animate attributeName="dx" values="0; -5; 3; -7; 4; 0" dur="0.35s" repeatCount="indefinite" />
      <animate attributeName="dy" values="0; 2; -1; 0; 1; 0" dur="0.35s" repeatCount="indefinite" />
      CAPSTONE PROJECT
    </text>
    
    <text x="50%" y="70" text-anchor="middle" fill="#FF00FF" opacity="0.8">
      <animate attributeName="dx" values="0; 6; -4; 5; -3; 0" dur="0.25s" repeatCount="indefinite" />
      <animate attributeName="dy" values="0; -2; 1; 0; -1; 0" dur="0.25s" repeatCount="indefinite" />
      CAPSTONE PROJECT
    </text>
    
    <text x="50%" y="70" text-anchor="middle" fill="#FFFFFF">
      CAPSTONE PROJECT
    </text>
  </g>
</svg>
